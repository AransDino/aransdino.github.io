<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · tragada por el volcán</title>
<link rel="icon" href="https://github.com/AransDino.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0a0f;
    color: #e8e4de;
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 115%, rgba(255,46,99,.25), transparent 65%);
  }
  .volcan { font-size: 5rem; animation: temblor 2.5s ease-in-out infinite; }
  @keyframes temblor {
    0%, 88%, 100% { transform: none; }
    90% { transform: translateX(-4px) rotate(-2deg); }
    93% { transform: translateX(4px) rotate(2deg); }
    96% { transform: translateX(-2px); }
  }
  h1 {
    font-size: clamp(4rem, 15vw, 8rem);
    font-weight: 800;
    background: linear-gradient(90deg, #ffb347, #ff6b35, #ff2e63);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
    margin: 16px 0;
  }
  p { color: #9a938c; max-width: 420px; line-height: 1.6; }
  code { font-family: 'JetBrains Mono', monospace; color: #4ecdc4; font-size: .9em; }
  a {
    margin-top: 32px;
    display: inline-block;
    padding: 13px 26px;
    border-radius: 12px;
    background: linear-gradient(90deg, #ff6b35, #ff2e63);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    transition: transform .2s, box-shadow .2s;
  }
  a:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,46,99,.35); }
</style>
</head>
<body>
  <div class="volcan">🌋</div>
  <h1>404</h1>
  <p>Esta página se la tragó el volcán. Pasa hasta en las mejores islas — pregunta en <code>Timanfaya</code>, que un día de 1730 se tragó pueblos enteros.</p>
  <a href="/">← Volver a tierra firme</a>
</body>
</html>
